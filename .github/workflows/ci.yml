name: GitHub-hosted

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            llvm: 20
            python: "3.12"
            runtime_cxx_standard: 17
          - os: ubuntu-24.04
            llvm: 21
            python: "3.13"
            runtime_cxx_standard: 20
          - os: ubuntu-24.04
            llvm: 21
            python: "3.14"
            runtime_cxx_standard: 20
          - os: macos-26
            llvm: 20
            python: "3.12"
            runtime_cxx_standard: 20

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / LLVM ${{ matrix.llvm }} / Py ${{ matrix.python }} / C++${{ matrix.runtime_cxx_standard }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-${{ matrix.llvm }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y \
            llvm-${{ matrix.llvm }}-dev \
            libclang-${{ matrix.llvm }}-dev \
            clang-${{ matrix.llvm }} \
            libpolly-${{ matrix.llvm }}-dev \
            libboost-dev libeigen3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@${{ matrix.llvm }} boost eigen
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: pip install CppJIT
        run: |
          pip install pytest numpy psutil
          pip install numba || true
          pip install . -v --config-settings=cmake.define.LLVM_DIR=${{
            runner.os == 'macOS'
            && format('/opt/homebrew/opt/llvm@{0}/lib/cmake/llvm', matrix.llvm)
            || format('/usr/lib/llvm-{0}/lib/cmake/llvm', matrix.llvm)
          }}

      - name: Build test dictionaries
        run: make -j4
        working-directory: test

      - name: Run tests
        run: python -m pytest -ra --tb=short --junitxml=../results.xml
        working-directory: test
        env:
          CPPINTEROP_EXTRA_INTERPRETER_ARGS: "-std=c++${{ matrix.runtime_cxx_standard }}"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.os }}-llvm${{ matrix.llvm }}-py${{ matrix.python }}-cpp${{ matrix.runtime_cxx_standard }}
          path: results.xml

  report:
    if: always() && github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- cppjit-ci -->';

            const rows = fs.readdirSync('.').filter(d => d.startsWith('result-')).sort().map(d => {
              const cfg = d.replace('result-', '');
              const file = `${d}/results.xml`;
              if (!fs.existsSync(file)) return `| ${cfg} | ⚠️ no results |`;
              const xml = fs.readFileSync(file, 'utf8');
              const attr = (name) => xml.match(new RegExp(`${name}="(\\d+)"`))?.[1] || '0';
              const [tests, fail, skip, err, time] = ['tests', 'failures', 'skipped', 'errors', 'time'].map(attr);
              const passed = tests - fail - skip - err;
              const status = (Number(fail) + Number(err)) > 0 ? '❌' : '✅';
              return `| ${status} ${cfg} | ${passed} passed, ${fail} failed, ${skip} skipped, ${err} errors (${time}s) |`;
            });

            const sha = context.payload.pull_request.head.sha;
            const shortSha = sha.slice(0, 7);
            const commitUrl = `${context.payload.repository.html_url}/commit/${sha}`;
            const time = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const body = [marker, `## Test Results`, `[\`${shortSha}\`](${commitUrl}) — ${time}\n`,
              '| Configuration | Result |', '|---|---|', ...rows].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
